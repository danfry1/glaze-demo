name: Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx tsc
      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."
          echo "Checking deployment health..."
          # This will fail - simulating a deployment failure
          exit 1
